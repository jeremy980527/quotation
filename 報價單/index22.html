<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>專業版報價單系統</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.min.js"></script>
<style>
:root {
  --primary: #333;
  --secondary: #666;
  --light: #aaa;
  --bg-start: #f0f0f0;
  --bg-end: #e0e0e0;
  --sidebar-bg: rgba(255,255,255,0.85);
  --main-bg: rgba(255,255,255,0.75);
  --border: rgba(0,0,0,0.1);
  --hover: rgba(0,0,0,0.05);
  --btn-bg: rgba(255,255,255,0.15);
  --btn-light: rgba(255,255,255,0.6);
  --btn-dark: rgba(0,0,0,0.3);
  --btn-text: #333;
  --btn-hover: rgba(255,255,255,0.25);
  --sidebar-w: 280px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --primary: #ddd;
    --secondary: #aaa;
    --light: #666;
    --bg-start: #1a1a2e;
    --bg-end: #16213e;
    --sidebar-bg: rgba(20,20,40,0.92);
    --main-bg: rgba(25,25,45,0.85);
    --border: rgba(255,255,255,0.12);
    --hover: rgba(255,255,255,0.06);
    --btn-bg: rgba(255,255,255,0.1);
    --btn-light: rgba(255,255,255,0.2);
    --btn-dark: rgba(255,255,255,0.1);
    --btn-text: #ddd;
    --btn-hover: rgba(255,255,255,0.18);
  }
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:linear-gradient(135deg,var(--bg-start),var(--bg-end));color:var(--primary);line-height:1.6;min-height:100vh}

/* Layout */
.app-container{display:flex;min-height:100vh}
.sidebar{width:var(--sidebar-w);background:var(--sidebar-bg);border-right:1px solid var(--border);padding:20px;display:flex;flex-direction:column;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);flex-shrink:0;transition:transform .3s ease;z-index:100}
.main-content{flex-grow:1;padding:40px;overflow-y:auto;position:relative;min-width:0}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99}
.hamburger{display:none;position:fixed;top:14px;left:14px;z-index:200;background:var(--sidebar-bg);border:1px solid var(--border);border-radius:8px;width:44px;height:44px;cursor:pointer;flex-direction:column;justify-content:center;align-items:center;gap:5px;backdrop-filter:blur(8px)}
.hamburger span{display:block;width:20px;height:2px;background:var(--primary);border-radius:2px;transition:all .3s}

/* Sidebar */
.sidebar-header{margin-bottom:10px;border-bottom:1px solid var(--border);padding-bottom:15px}
.sidebar-header h2{font-size:1.15rem;color:var(--primary)}
#client-folder-list{list-style:none;overflow-y:auto;flex-grow:1}
#client-folder-list li{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;border-radius:6px;cursor:pointer;transition:background .2s;font-weight:500;color:var(--primary)}
.client-name-wrapper{display:flex;align-items:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.client-name-wrapper::before{content:'📁';margin-right:9px;font-size:1rem}
#client-folder-list li:hover{background:var(--hover)}
#client-folder-list li.active{background:rgba(0,0,0,.1)}
.del-folder-btn{background:none;border:none;cursor:pointer;font-size:.95rem;color:var(--light);padding:4px;border-radius:50%;width:28px;height:28px;text-align:center;visibility:hidden;opacity:0;transition:all .2s;flex-shrink:0}
#client-folder-list li:hover .del-folder-btn{visibility:visible;opacity:1}

/* Views */
.content-view{display:none}
.content-view.active{display:block}
.form-container,.quote-list-container{background:var(--main-bg);padding:30px;border-radius:12px;box-shadow:0 6px 24px rgba(0,0,0,.1);backdrop-filter:blur(15px);-webkit-backdrop-filter:blur(15px);border:1px solid rgba(255,255,255,.4)}
.form-container h1,.quote-list-container h1{margin-bottom:20px;font-size:1.6rem}

/* Form */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.form-group{margin-bottom:18px}
.form-group.full-width{grid-column:1/-1}
.form-group label{display:block;margin-bottom:6px;font-weight:600;font-size:.9rem;color:var(--secondary)}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:7px;font-size:.95rem;background:rgba(255,255,255,.45);color:var(--primary);transition:border-color .2s}
.form-group input:focus,.form-group textarea:focus{outline:none;border-color:rgba(0,0,0,.3)}
.form-group h4{margin:20px 0 10px;font-size:1rem;color:var(--secondary)}
.item-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;align-items:flex-end;background:rgba(255,255,255,.2);border-radius:8px;padding:10px}
.item-row .form-group{margin-bottom:0}
.table-wrap{overflow-x:auto}
.quote-table{width:100%;border-collapse:collapse;margin-top:16px;white-space:nowrap}
.quote-table th,.quote-table td{padding:10px 13px;border:1px solid var(--border);text-align:left;font-size:.9rem}
.quote-table thead{background:var(--hover)}

/* Buttons */
.tilt-container{perspective:1200px;display:inline-block;vertical-align:middle;margin:3px}
.gbtn{position:relative;display:flex;justify-content:center;align-items:center;padding:11px 18px;font-size:.95rem;text-align:center;white-space:nowrap;border:1px solid var(--btn-light);border-radius:9px;background:var(--btn-bg);color:var(--btn-text);cursor:pointer;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);box-shadow:0 6px 24px rgba(0,0,0,.12);transition:transform .15s ease-out,background .2s,box-shadow .2s;transform-style:preserve-3d;min-height:42px;font-family:inherit}
.gbtn:hover{background:var(--btn-hover);box-shadow:0 10px 36px rgba(0,0,0,.2)}
.gbtn:disabled{opacity:.55;cursor:not-allowed;box-shadow:none}
.btn-full{width:100%}
.btn-add{background:rgba(0,0,0,.2)}
.btn-dl{background:rgba(0,0,0,.15)}
.btn-del{background:rgba(220,0,0,.2);border-color:rgba(220,0,0,.4);color:#fff;border-radius:50%;width:38px;height:38px;padding:0;font-size:1.1rem;flex-shrink:0}
.btn-del:hover{background:rgba(220,0,0,.35)}
.action-btn{padding:5px 10px;font-size:.78rem;min-width:72px;min-height:32px}
#settings-container{position:absolute;top:22px;right:38px;z-index:10}
#settings-btn{font-size:1.4rem;border-radius:50%;width:46px;height:46px;padding:0;background:rgba(0,0,0,.18)}

/* Settings modal */
#settings-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;justify-content:center;align-items:center;z-index:1000}
#settings-overlay.active{display:flex}
.settings-modal{background:var(--main-bg);padding:28px;border-radius:12px;width:90%;max-width:480px;box-shadow:0 8px 32px rgba(0,0,0,.25);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.5);max-height:90vh;overflow-y:auto}
.settings-modal h2{margin-bottom:6px}
.settings-modal p{color:var(--secondary);font-size:.88rem;margin-bottom:16px}
.modal-actions{margin-top:18px;text-align:right}

/* Confirm dialog */
.confirm-dialog{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;justify-content:center;align-items:center;z-index:2000}
.confirm-dialog.active{display:flex}
.confirm-box{background:var(--main-bg);backdrop-filter:blur(20px);padding:28px;border-radius:12px;max-width:340px;width:90%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.3)}
.confirm-box h3{color:#c62828;margin-bottom:10px}
.confirm-actions{display:flex;gap:10px;justify-content:center;margin-top:18px}

/* Toast */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:#444;color:#fff;padding:10px 22px;border-radius:8px;font-size:.9rem;z-index:9999;transition:transform .3s ease;box-shadow:0 4px 18px rgba(0,0,0,.3);pointer-events:none;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{background:#2e7d32}
.toast.err{background:#c62828}

/* Spinner */
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;margin-right:7px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

/* Search */
.search-input{width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:6px;margin-bottom:13px;background:rgba(255,255,255,.4);color:var(--primary);font-size:.9rem;min-height:38px}
.search-row{display:flex;gap:10px;margin-bottom:16px;align-items:center}
.search-row input{flex-grow:1;margin:0}
.search-row select{padding:7px 10px;border:1px solid var(--border);border-radius:6px;background:rgba(255,255,255,.4);color:var(--primary);font-size:.88rem}

/* Responsive */
@media(max-width:768px){
  .hamburger{display:flex}
  .sidebar{position:fixed;top:0;left:0;height:100vh;transform:translateX(-100%);box-shadow:4px 0 24px rgba(0,0,0,.18)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.active{display:block}
  .main-content{padding:18px 14px;padding-top:68px}
  .form-grid{grid-template-columns:1fr}
  .form-group.full-width{grid-column:1}
  #settings-container{top:14px;right:14px}
  .form-container,.quote-list-container{padding:16px}
  .item-row{flex-direction:column}
  .item-row .form-group{width:100%}
  .quote-table th,.quote-table td{padding:7px 9px;font-size:.82rem}
  .action-btn{min-width:56px;font-size:.74rem;padding:5px 7px}
}
@media(max-width:480px){
  .main-content{padding:12px 10px;padding-top:66px}
  .form-container,.quote-list-container{padding:12px;border-radius:8px}
  .gbtn{padding:9px 13px;font-size:.88rem}
}
</style>
</head>
<body>

<button class="hamburger" id="hamburger" aria-label="選單">
  <span></span><span></span><span></span>
</button>
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<div class="app-container">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header"><h2>📋 客戶資料夾</h2></div>
    <input type="search" id="folder-search" class="search-input" placeholder="搜尋客戶...">
    <ul id="client-folder-list"></ul>
    <div class="tilt-container" style="margin-top:18px;width:100%">
      <button class="gbtn btn-add btn-full" id="btn-new-quote">＋ 新增報價單</button>
    </div>
    <div class="tilt-container" style="margin-top:9px;width:100%">
      <button class="gbtn btn-dl btn-full" id="btn-zip">一鍵備份所有報價單 (ZIP)</button>
    </div>
  </aside>

  <main class="main-content">
    <div id="settings-container" class="tilt-container">
      <button id="settings-btn" class="gbtn" title="設定公司資訊">⚙️</button>
    </div>

    <div id="welcome-view" class="content-view active">
      <div class="form-container">
        <h1>歡迎使用專業版報價單系統</h1>
        <p style="color:var(--secondary);margin-bottom:10px">點擊左側「新增報價單」建立報價單，或選擇客戶資料夾查看紀錄。</p>
        <p style="color:var(--secondary);font-size:.88rem">💡 請先點右上角 ⚙️ 設定公司資訊，匯出時會自動帶入。</p>
      </div>
    </div>

    <div id="add-quote-view" class="content-view">
      <div class="form-container">
        <h1 id="form-title">建立新的報價單</h1>
        <form id="quote-form">
          <h4 style="margin-bottom:14px;color:var(--secondary)">客戶與專案資訊</h4>
          <div class="form-grid">
            <div class="form-group"><label>業主/客戶名稱 *</label><input type="text" id="f-contact" required placeholder="例：王小明"></div>
            <div class="form-group"><label>公司寶號</label><input type="text" id="f-company" placeholder="例：ABC 科技公司"></div>
            <div class="form-group"><label>工程名稱</label><input type="text" id="f-project" placeholder="例：A廠房鋼構工程"></div>
            <div class="form-group"><label>工作地點/地址</label><input type="text" id="f-address" placeholder="工程地點"></div>
            <div class="form-group"><label>統一編號</label><input type="text" id="f-taxid" placeholder="8 位數字" maxlength="8"></div>
            <div class="form-group"><label>電話</label><input type="text" id="f-phone" placeholder="客戶聯絡電話"></div>
          </div>
          <div id="items-container"><h4>報價項目</h4></div>
          <div class="tilt-container">
            <button type="button" id="btn-add-item" class="gbtn">＋ 新增項目列</button>
          </div>
          <div class="form-group full-width" style="margin-top:18px">
            <label>備註事項</label>
            <textarea id="f-remarks" rows="3" placeholder="特殊條件、付款方式..."></textarea>
          </div>
          <hr style="margin:24px 0;border:none;border-top:1px solid var(--border)">
          <div class="tilt-container">
            <button type="submit" id="btn-save" class="gbtn btn-add btn-full">儲存報價單</button>
          </div>
        </form>
      </div>
    </div>

    <div id="quote-list-view" class="content-view">
      <div class="quote-list-container">
        <h1 id="list-title"></h1>
        <div class="search-row">
          <input type="search" id="quote-search" class="search-input" placeholder="搜尋報價單...">
          <select id="quote-search-mode">
            <option value="id">依報價單號</option>
            <option value="keyword">依關鍵詞</option>
          </select>
        </div>
        <div class="table-wrap">
          <table class="quote-table">
            <thead><tr><th>報價單號</th><th>建立日期</th><th>工程名稱</th><th>含稅總額</th><th>操作</th></tr></thead>
            <tbody id="quote-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Settings -->
<div id="settings-overlay">
  <div class="settings-modal">
    <h2>⚙️ 公司資訊設定</h2>
    <p>此資訊將顯示在所有匯出的報價單上。</p>
    <div class="form-group"><label>公司名稱</label><input type="text" id="s-name" placeholder="昱偉機械工程有限公司"></div>
    <div class="form-group"><label>統一編號</label><input type="text" id="s-taxid" placeholder="84959997"></div>
    <div class="form-group"><label>公司地址</label><input type="text" id="s-address" placeholder="新北市..."></div>
    <div class="form-group"><label>電話</label><input type="text" id="s-phone" placeholder="02-22919477"></div>
    <div class="form-group"><label>傳真</label><input type="text" id="s-fax" placeholder="02-22919532"></div>
    <div class="form-group"><label>電子郵件</label><input type="email" id="s-email" placeholder="info@company.com"></div>
    <div class="form-group"><label>經手人</label><input type="text" id="s-agent" placeholder="張坤銘 0930-881-980"></div>
    <div class="modal-actions">
      <div class="tilt-container"><button id="btn-close-settings" class="gbtn">關閉</button></div>
      <div class="tilt-container"><button id="btn-save-settings" class="gbtn btn-add">儲存設定</button></div>
    </div>
  </div>
</div>

<!-- Confirm -->
<div class="confirm-dialog" id="confirm-dialog">
  <div class="confirm-box">
    <h3>⚠️ 確認刪除</h3>
    <p id="confirm-msg"></p>
    <div class="confirm-actions">
      <div class="tilt-container"><button class="gbtn" id="btn-confirm-cancel">取消</button></div>
      <div class="tilt-container"><button class="gbtn" id="btn-confirm-ok" style="background:rgba(200,0,0,.3);border-color:rgba(200,0,0,.5)">確認刪除</button></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  // --- DOM refs ---
  const sidebar = document.getElementById('sidebar');
  const hamburger = document.getElementById('hamburger');
  const sidebarOverlay = document.getElementById('sidebar-overlay');
  const btnNewQuote = document.getElementById('btn-new-quote');
  const btnZip = document.getElementById('btn-zip');
  const folderList = document.getElementById('client-folder-list');
  const quoteForm = document.getElementById('quote-form');
  const itemsContainer = document.getElementById('items-container');
  const btnAddItem = document.getElementById('btn-add-item');
  const quoteTbody = document.getElementById('quote-tbody');
  const listTitle = document.getElementById('list-title');
  const settingsBtn = document.getElementById('settings-btn');
  const settingsOverlay = document.getElementById('settings-overlay');
  const btnSaveSettings = document.getElementById('btn-save-settings');
  const btnCloseSettings = document.getElementById('btn-close-settings');
  const formTitle = document.getElementById('form-title');
  const btnSave = document.getElementById('btn-save');
  const folderSearch = document.getElementById('folder-search');
  const quoteSearch = document.getElementById('quote-search');
  const quoteSearchMode = document.getElementById('quote-search-mode');
  const toast = document.getElementById('toast');
  const confirmDialog = document.getElementById('confirm-dialog');
  const confirmMsg = document.getElementById('confirm-msg');
  const btnConfirmOk = document.getElementById('btn-confirm-ok');
  const btnConfirmCancel = document.getElementById('btn-confirm-cancel');

  let quotes = [], company = {}, editId = null, activeClient = null, confirmCb = null;

  // --- Mobile sidebar ---
  hamburger.addEventListener('click', () => openSidebar(true));
  sidebarOverlay.addEventListener('click', () => openSidebar(false));
  function openSidebar(on) {
    sidebar.classList.toggle('open', on);
    sidebarOverlay.classList.toggle('active', on);
  }
  function closeSidebarMobile() { if (window.innerWidth <= 768) openSidebar(false); }

  // --- Toast ---
  let toastTimer;
  function showToast(msg, type = '') {
    clearTimeout(toastTimer);
    toast.textContent = msg;
    toast.className = `toast show ${type}`;
    toastTimer = setTimeout(() => { toast.className = 'toast'; }, 2800);
  }

  // --- Confirm ---
  function showConfirm(msg, cb) {
    confirmMsg.textContent = msg;
    confirmCb = cb;
    confirmDialog.classList.add('active');
  }
  btnConfirmOk.addEventListener('click', () => { confirmDialog.classList.remove('active'); if (confirmCb) confirmCb(); });
  btnConfirmCancel.addEventListener('click', () => confirmDialog.classList.remove('active'));

  // --- Tilt ---
  function initTilt() {
    document.querySelectorAll('.tilt-container').forEach(c => {
      if (c.dataset.t) return;
      c.dataset.t = '1';
      const b = c.querySelector('.gbtn');
      if (!b) return;
      c.addEventListener('mousemove', e => {
        const r = c.getBoundingClientRect();
        const rx = ((e.clientY - r.top - r.height/2) / (r.height/2)) * -12;
        const ry = ((e.clientX - r.left - r.width/2) / (r.width/2)) * 12;
        b.style.transform = `rotateX(${rx}deg) rotateY(${ry}deg)`;
      });
      c.addEventListener('mouseleave', () => { b.style.transform = ''; });
    });
  }

  // --- Storage ---
  function load() {
    try {
      const q = localStorage.getItem('proQuotes');
      if (q) quotes = JSON.parse(q);
      const c = localStorage.getItem('myCompanyInfo');
      if (c) company = JSON.parse(c);
    } catch(e) { quotes = []; company = {}; }
  }
  function save() {
    localStorage.setItem('proQuotes', JSON.stringify(quotes));
    localStorage.setItem('myCompanyInfo', JSON.stringify(company));
  }

  // --- Utils ---
  function switchView(id) {
    document.querySelectorAll('.content-view').forEach(v => v.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }
  function genId() {
    const d = new Date();
    return `Q-${d.getFullYear()}${p2(d.getMonth()+1)}${p2(d.getDate())}-${d.getTime().toString().slice(-4)}`;
  }
  function p2(n) { return String(n).padStart(2,'0'); }
  function fmtCurrency(n) { return new Intl.NumberFormat('zh-TW',{style:'currency',currency:'TWD',minimumFractionDigits:0}).format(n); }
  function fmtMinguo(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    return `${d.getFullYear()-1911}年 ${d.getMonth()+1}月 ${d.getDate()}日`;
  }
  function toChineseMoney(num) {
    const chars = '零壹貳參肆伍陸柒捌玖', units = '元拾佰仟萬拾佰仟億';
    let str = '', i = 0, s = Math.round(num).toString();
    for (let j = s.length-1; j >= 0; j--) str = chars[s[j]] + units[i++] + str;
    return str.replace(/零[拾佰仟]/g,'零').replace(/零{2,}/g,'零').replace(/(零|)萬/g,'萬')
              .replace(/(零|)億/g,'億').replace(/億萬/g,'億').replace(/零元/g,'元')
              .replace(/^元/g,'').replace(/元$/g,'元整');
  }
  // Returns 7-digit array [百萬,十萬,萬,千,百,十,元]
  function digits7(n) { return String(Math.round(n)).padStart(7,'0').split('').slice(-7); }

  // --- Render sidebar ---
  function renderFolders() {
    const grouped = quotes.reduce((a,q) => { (a[q.customerContactName] = a[q.customerContactName]||[]).push(q); return a; }, {});
    folderList.innerHTML = '';
    const clients = Object.keys(grouped).sort();
    if (!clients.length) { folderList.innerHTML = '<p style="color:var(--secondary);padding:14px">尚無客戶資料</p>'; }
    clients.forEach(name => {
      const li = document.createElement('li');
      li.dataset.client = name;
      li.innerHTML = `<span class="client-name-wrapper">${name}</span><button class="del-folder-btn" title="刪除">🗑️</button>`;
      folderList.appendChild(li);
    });

    const term = folderSearch.value.trim().toLowerCase();

  function renderQuoteList(clientName) {
    activeClient = clientName;

    let list = quotes.filter(q => q.customerContactName === clientName);
    const term = quoteSearch.value.trim().toLowerCase();
    const mode = quoteSearchMode.value;
    if (term) {
      list = list.filter(q => mode === 'id'
        ? q.id.toLowerCase().includes(term)
        : (q.projectName||'').toLowerCase().includes(term) || q.items.some(i => i.description.toLowerCase().includes(term))

  // ============================================================
  // XLSX EXPORT — 完全仿照圖片格式
  // ============================================================
  function exportXLSX(id) {
    const q = quotes.find(q => q.id === id);
    if (!q) return;
    const sub = q.items.reduce((s,i) => s + i.quantity*i.unitPrice, 0);
    const grand = Math.round(sub * 1.05);
    const d = digits7(grand);

    // Row index constants
    const R_COMPANY = 0, R_TITLE = 1, R_BLANK1 = 2;
    const R_INFO1 = 3, R_INFO2 = 4, R_BLANK2 = 5;
    const R_HEADER = 6;
    const R_ITEMS_START = 7;
    const ITEM_COUNT = 27;
    const R_ITEMS_END = R_ITEMS_START + ITEM_COUNT - 1; // 33
    const R_TOT_HDR = R_ITEMS_END + 1; // 34
    const R_TOT_VAL = R_ITEMS_END + 2; // 35
    const R_BLANK3 = R_TOT_VAL + 1;   // 36
    const R_FOOT1 = R_BLANK3 + 1;     // 37
    const R_FOOT2 = R_FOOT1 + 1;      // 38

    function showDigit(i) {
      for (let j = 0; j < i; j++) if (d[j] !== '0') return parseInt(d[i]);
      return d[i] === '0' ? null : parseInt(d[i]);
    }

    const data = [];
    data[R_COMPANY] = [company.name||'公司名稱', null,null,null,null,null,null];
    data[R_TITLE]   = ['估　價　單', null,null,null,null,null,null];
    data[R_BLANK1]  = [null,null,null,null,null,null,null];
    data[R_INFO1]   = [`業　主：${q.customerContactName||''}`, null, null, `工作地點：${q.customerAddress||''}`, null, null, null];
    data[R_INFO2]   = [`工程名稱：${q.projectName||''}`, null, null, `估價日期：${fmtMinguo(q.date)}`, null, null, null];
    data[R_BLANK2]  = [null,null,null,null,null,null,null];
    data[R_HEADER]  = ['項目','名　稱','數量','單位','單價','總價','備註'];

    for (let i = 0; i < ITEM_COUNT; i++) {
      const item = q.items[i];
      data[R_ITEMS_START + i] = item
        ? [i+1, item.description||'', item.quantity||null, item.unit||'', item.unitPrice||null, (item.quantity*item.unitPrice)||null, item.remark||'']
        : [i+1, null, null, null, null, null, null];
    }

    // 總價合計標頭列
    data[R_TOT_HDR] = ['總價合計', null, '佰', '拾', '萬', '仟　佰　拾', 'NT'];
    // 總價值列
    data[R_TOT_VAL] = [
      `總價新台幣：${toChineseMoney(grand)}`,
      null,
      showDigit(0),
      showDigit(1),
      parseInt(d[2]),
      `${d[3]}　${d[4]}　${d[5]}`,
      parseInt(d[6])
    ];
    data[R_BLANK3]  = [null,null,null,null,null,null,null];
    data[R_FOOT1]   = [`地址：${company.address||''}`, null, `統一編號：${company.taxId||''}`, null, '第　　頁，共　　頁', null, null];
    data[R_FOOT2]   = [`電話：${company.phone||''}`, null, `傳真：${company.fax||''}`, null, `經理人：${company.agent||''}`, null, null];

    const ws = XLSX.utils.aoa_to_sheet(data);

    // --- Style helpers ---
    const fn = (sz, bold=false) => ({name:'新細明體', sz, bold});
    const al = (h, v='center', wrap=false) => ({horizontal:h, vertical:v, wrapText:wrap});
    const bd = (s='thin') => ({top:{style:s},bottom:{style:s},left:{style:s},right:{style:s}});
    const bdB = (s='thin') => ({bottom:{style:s}});

    function sc(r, c, style) {
      const a = XLSX.utils.encode_cell({r,c});
      if (!ws[a]) ws[a] = {t:'z', v:null};
      ws[a].s = style;
    }
    function gs(r, c) {
      const a = XLSX.utils.encode_cell({r,c});
      return ws[a] || null;
    }

    // Company name
    sc(R_COMPANY, 0, {font:fn(22,true), alignment:al('center')});
    // Title
    sc(R_TITLE, 0, {font:fn(18,true), alignment:al('center')});

    // Info rows 3-4: apply bottom border to all cells
    for (let c = 0; c < 7; c++) {
      sc(R_INFO1, c, {font:fn(11), alignment:al('left','center'), border:bdB('thin')});
      sc(R_INFO2, c, {font:fn(11), alignment:al('left','center'), border:bdB('medium')});
    }
    // 日期靠右
    sc(R_INFO2, 3, {font:fn(11), alignment:al('right','center'), border:bdB('medium')});

    // Header row
    const hAligns = ['center','left','center','center','right','right','left'];
    for (let c = 0; c < 7; c++) {
      sc(R_HEADER, c, {font:fn(11,true), alignment:al(hAligns[c]), border:bd('thin')});
    }

    // Item rows
    const iAligns = ['center','left','center','center','right','right','left'];
    for (let r = R_ITEMS_START; r <= R_ITEMS_END; r++) {
      for (let c = 0; c < 7; c++) {
        const a = XLSX.utils.encode_cell({r,c});
        if (!ws[a]) ws[a] = {t:'z', v:null};
        ws[a].s = {font:fn(10), alignment:al(iAligns[c]), border:bd('thin')};
        if ((c===4||c===5) && ws[a].t==='n') ws[a].s.numFmt = '#,##0';
      }
    }

    // Total header row (R_TOT_HDR)
    sc(R_TOT_HDR, 0, {font:fn(10,true), alignment:al('left'), border:bd('thin')});
    sc(R_TOT_HDR, 1, {font:fn(10,true), alignment:al('left'), border:bd('thin')});
    for (let c = 2; c < 7; c++) {
      sc(R_TOT_HDR, c, {font:fn(9,true), alignment:al('center'), border:bd('thin')});
    }

    // Total value row (R_TOT_VAL)
    sc(R_TOT_VAL, 0, {font:fn(10), alignment:al('left','center',true), border:bd('thin')});
    sc(R_TOT_VAL, 1, {font:fn(10), alignment:al('left'), border:bd('thin')});
    for (let c = 2; c < 7; c++) {
      const a = XLSX.utils.encode_cell({r:R_TOT_VAL,c});
      if (!ws[a]) ws[a] = {t:'z', v:null};
      ws[a].s = {font:fn(13,true), alignment:al('center'), border:bd('thin')};
    }

    // Footer
    for (let r = R_FOOT1; r <= R_FOOT2; r++) {
      for (let c = 0; c < 7; c++) {
        const a = XLSX.utils.encode_cell({r,c});
        if (!ws[a]) ws[a] = {t:'z', v:null};
        ws[a].s = {font:fn(10), alignment:{vertical:'center'}};
      }
      const rA = XLSX.utils.encode_cell({r, c:4});
      if (ws[rA]) ws[rA].s = {font:fn(10), alignment:al('right','center')};
    }

    // --- Merges ---
    ws['!merges'] = [
      {s:{r:R_COMPANY,c:0}, e:{r:R_COMPANY,c:6}},
      {s:{r:R_TITLE,c:0},   e:{r:R_TITLE,c:6}},
      {s:{r:R_INFO1,c:0},   e:{r:R_INFO1,c:2}},
      {s:{r:R_INFO1,c:3},   e:{r:R_INFO1,c:6}},
      {s:{r:R_INFO2,c:0},   e:{r:R_INFO2,c:2}},
      {s:{r:R_INFO2,c:3},   e:{r:R_INFO2,c:6}},
      {s:{r:R_TOT_HDR,c:0}, e:{r:R_TOT_HDR,c:1}},
      {s:{r:R_TOT_VAL,c:0}, e:{r:R_TOT_VAL,c:1}},
      {s:{r:R_FOOT1,c:0},   e:{r:R_FOOT1,c:1}},
      {s:{r:R_FOOT1,c:2},   e:{r:R_FOOT1,c:3}},
      {s:{r:R_FOOT1,c:4},   e:{r:R_FOOT1,c:6}},
      {s:{r:R_FOOT2,c:0},   e:{r:R_FOOT2,c:1}},
      {s:{r:R_FOOT2,c:2},   e:{r:R_FOOT2,c:3}},
      {s:{r:R_FOOT2,c:4},   e:{r:R_FOOT2,c:6}},
    ];

    // --- Column widths ---
    ws['!cols'] = [
      {wch:6},{wch:38},{wch:8},{wch:7},{wch:12},{wch:14},{wch:16}
    ];

    // --- Row heights ---
    ws['!rows'] = [];
    ws['!rows'][R_COMPANY] = {hpt:38};
    ws['!rows'][R_TITLE]   = {hpt:32};
    ws['!rows'][R_INFO1]   = {hpt:22};
    ws['!rows'][R_INFO2]   = {hpt:22};
    ws['!rows'][R_HEADER]  = {hpt:22};
    for (let i = R_ITEMS_START; i <= R_ITEMS_END; i++) ws['!rows'][i] = {hpt:19};
    ws['!rows'][R_TOT_HDR] = {hpt:17};
    ws['!rows'][R_TOT_VAL] = {hpt:22};
    ws['!rows'][R_FOOT1]   = {hpt:19};
    ws['!rows'][R_FOOT2]   = {hpt:19};

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '估價單');
    XLSX.writeFile(wb, `估價單-${q.projectName||q.customerContactName}-${q.id}.xlsx`);
    showToast('XLSX 已下載', 'ok');
  }

  // --- CSV for ZIP ---
  function genCSV(q) {
    const sub = q.items.reduce((s,i) => s + i.quantity*i.unitPrice, 0);
    const grand = Math.round(sub * 1.05);
    const rows = [
      ['報價單號',q.id],['建立日期',new Date(q.date).toLocaleDateString('zh-TW')],
      ['業主',q.customerContactName],['公司',q.customerCompanyName||''],
      ['工程名稱',q.projectName||''],['地址',q.customerAddress||''],
      ['統編',q.customerTaxId||''],['電話',q.customerPhone||''],
      [],['項目','名稱','數量','單位','單價','總價','備註'],
      ...q.items.map((item,i) => [i+1,item.description,item.quantity,item.unit,item.unitPrice,item.quantity*item.unitPrice,item.remark||'']),
      [],['稅前合計',sub],['含稅總計(5%)',grand],['備註',q.remarks||''],
    ];
    return '﻿' + rows.map(r => r.map(v => `"${String(v??'').replace(/"/g,'""')}"`).join(',')).join('\r\n');
  }

  // --- ZIP ---
  async function downloadZip() {
    if (!quotes.length) { showToast('沒有報價單可備份', 'err'); return; }
    btnZip.disabled = true;
    btnZip.innerHTML = '<span class="spin"></span>處理中...';
    try {
      const zip = new JSZip();
      const grouped = quotes.reduce((a,q) => { (a[q.customerContactName]=a[q.customerContactName]||[]).push(q); return a; }, {});
      for (const name in grouped) {
        const folder = zip.folder(name);
        for (const q of grouped[name]) folder.file(`報價單-${q.id}.csv`, genCSV(q));
      }
      const blob = await zip.generateAsync({type:'blob'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `報價單備份-${new Date().toISOString().slice(0,10)}.zip`;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      showToast('ZIP 備份已下載', 'ok');
    } catch(e) {
      console.error(e); showToast('備份失敗', 'err');
    } finally {
      btnZip.disabled = false; btnZip.textContent = '一鍵備份所有報價單 (ZIP)';
    }
  }

  btnAddItem.addEventListener('click', () => addItemRow());

  quoteForm.addEventListener('submit', e => {
    e.preventDefault();
    const name = document.getElementById('f-contact').value.trim();
    if (!name) { showToast('業主/客戶名稱為必填！', 'err'); return; }
    const items = [];
    document.querySelectorAll('.item-row').forEach(r => {
      const desc = r.querySelector('.i-desc').value.trim();
      const qty = parseFloat(r.querySelector('.i-qty').value) || 0;
      const unit = r.querySelector('.i-unit').value.trim();
      const price = parseFloat(r.querySelector('.i-price').value) || 0;
      const remark = r.querySelector('.i-remark').value.trim();
      if (desc) items.push({description:desc, quantity:qty, unit, unitPrice:price, remark});
    });
    if (!items.length) { showToast('請至少新增一個報價項目！', 'err'); return; }
    const data = {
      customerContactName: name,
      customerCompanyName: document.getElementById('f-company').value.trim(),
      projectName: document.getElementById('f-project').value.trim(),
      customerAddress: document.getElementById('f-address').value.trim(),
      customerTaxId: document.getElementById('f-taxid').value.trim(),
      customerPhone: document.getElementById('f-phone').value.trim(),
      remarks: document.getElementById('f-remarks').value.trim(),
      items
    };
    if (editId) {
      const idx = quotes.findIndex(q => q.id === editId);
      if (idx !== -1) { quotes[idx] = {...quotes[idx], ...data}; showToast(`報價單 #${editId} 已更新`, 'ok'); }
    } else {
      quotes.push({...data, id:genId(), date:new Date().toISOString()});
      showToast(`客戶「${name}」的報價單已建立`, 'ok');
    }
    save(); renderFolders(); editId = null;
    const el = folderList.querySelector(`li[data-client="${name}"]`);
    if (el) el.click();
  });

  document.body.addEventListener('click', e => {
    const btn = e.target.closest('.action-btn');
    if (!btn) return;
    const id = btn.dataset.id;
    if (btn.classList.contains('html-btn')) exportHTML(id);
    if (btn.classList.contains('xlsx-btn')) exportXLSX(id);
    if (btn.classList.contains('edit-btn')) loadQuoteForm(id);
  });

  btnZip.addEventListener('click', downloadZip);

  folderList.addEventListener('click', e => {
    const li = e.target.closest('li');
    if (!li) return;
    if (e.target.classList.contains('del-folder-btn')) {
      e.stopPropagation();
      const name = li.dataset.client;
      showConfirm(`確定要刪除客戶「${name}」的所有報價單嗎？此操作無法復原！`, () => {
        quotes = quotes.filter(q => q.customerContactName !== name);
        save(); renderFolders(); switchView('welcome-view');
        showToast(`已刪除「${name}」`, 'err');
      });
    } else {
      folderList.querySelectorAll('li').forEach(i => i.classList.remove('active'));
      li.classList.add('active');
      quoteSearch.value = '';
      renderQuoteList(li.dataset.client);
    }
  });

  settingsBtn.addEventListener('click', () => {
    document.getElementById('s-name').value    = company.name    || '';
    document.getElementById('s-taxid').value   = company.taxId  || '';
    document.getElementById('s-address').value = company.address|| '';
    document.getElementById('s-phone').value   = company.phone  || '';
    document.getElementById('s-fax').value     = company.fax    || '';
    document.getElementById('s-email').value   = company.email  || '';
    document.getElementById('s-agent').value   = company.agent  || '';
    settingsOverlay.classList.add('active');
  });

  const closeSettings = () => settingsOverlay.classList.remove('active');
  btnCloseSettings.addEventListener('click', closeSettings);
  settingsOverlay.addEventListener('click', e => { if (e.target === settingsOverlay) closeSettings(); });

  btnSaveSettings.addEventListener('click', () => {
    company = {
      name:    document.getElementById('s-name').value.trim(),
      taxId:   document.getElementById('s-taxid').value.trim(),
      address: document.getElementById('s-address').value.trim(),
      phone:   document.getElementById('s-phone').value.trim(),
      fax:     document.getElementById('s-fax').value.trim(),
      email:   document.getElementById('s-email').value.trim(),
      agent:   document.getElementById('s-agent').value.trim(),
    };
    save(); showToast('公司資訊已儲存', 'ok'); closeSettings();
  });

  folderSearch.addEventListener('input', filterFolders);
  quoteSearch.addEventListener('input', () => { if (activeClient) renderQuoteList(activeClient); });
  quoteSearchMode.addEventListener('change', () => { if (activeClient) renderQuoteList(activeClient); });

  // Init
  load(); renderFolders(); initTilt();
});
</script>
</body>
</html>
